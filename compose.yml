---
services:
  claude-code:
    container_name: claude-code
    image: dceoy/claude-code:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: cli
      args:
        USER_NAME: agent
        USER_UID: '1001'
        USER_GID: '1001'
        ZSH_THEME: nicoulaj
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace
      - claude-config:/home/agent/.claude
      - config-data:/home/agent/.config
    working_dir: /workspace
    post_start:
      - command: bash -c '[[ "$(stat -c "%U:%G" /home/agent/.claude)" != "root:root" ]] || chown agent:agent /home/agent/.claude'
        user: root
      - command: bash -c '[[ "$(stat -c "%U:%G" /home/agent/.config)" != "root:root" ]] || chown agent:agent /home/agent/.config'
        user: root
      - command: git config --global --add safe.directory /workspace
        user: agent
    entrypoint:
      - /usr/bin/zsh
    command:
      - -lc
      - 'claude --dangerously-skip-permissions'
volumes:
  claude-config:
  config-data:
