---
model_list:
  - model_name: gemini-opus
    litellm_params:
      model: os.environ/LITELLM_GEMINI_OPUS_MODEL
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini-sonnet
    litellm_params:
      model: os.environ/LITELLM_GEMINI_SONNET_MODEL
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini-haiku
    litellm_params:
      model: os.environ/LITELLM_GEMINI_HAIKU_MODEL
      api_key: os.environ/GEMINI_API_KEY
  - model_name: cerebras-opus
    litellm_params:
      model: os.environ/LITELLM_CEREBRAS_OPUS_MODEL
      api_key: os.environ/CEREBRAS_API_KEY
  - model_name: cerebras-sonnet
    litellm_params:
      model: os.environ/LITELLM_CEREBRAS_SONNET_MODEL
      api_key: os.environ/CEREBRAS_API_KEY
  - model_name: cerebras-haiku
    litellm_params:
      model: os.environ/LITELLM_CEREBRAS_HAIKU_MODEL
      api_key: os.environ/CEREBRAS_API_KEY
  - model_name: groq-opus
    litellm_params:
      model: os.environ/LITELLM_GROQ_OPUS_MODEL
      api_key: os.environ/GROQ_API_KEY
  - model_name: groq-sonnet
    litellm_params:
      model: os.environ/LITELLM_GROQ_SONNET_MODEL
      api_key: os.environ/GROQ_API_KEY
  - model_name: groq-haiku
    litellm_params:
      model: os.environ/LITELLM_GROQ_HAIKU_MODEL
      api_key: os.environ/GROQ_API_KEY
  - model_name: openrouter-opus
    litellm_params:
      model: os.environ/LITELLM_OPENROUTER_OPUS_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OPENROUTER_SITE_URL
        X-Title: os.environ/OPENROUTER_APP_NAME
  - model_name: openrouter-sonnet
    litellm_params:
      model: os.environ/LITELLM_OPENROUTER_SONNET_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OPENROUTER_SITE_URL
        X-Title: os.environ/OPENROUTER_APP_NAME
  - model_name: openrouter-haiku
    litellm_params:
      model: os.environ/LITELLM_OPENROUTER_HAIKU_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OPENROUTER_SITE_URL
        X-Title: os.environ/OPENROUTER_APP_NAME
litellm_settings:
  drop_params: true
  fallbacks:
    - gemini-opus:
        - cerebras-opus
        - groq-opus
        - openrouter-opus
    - gemini-sonnet:
        - cerebras-sonnet
        - groq-sonnet
        - openrouter-sonnet
    - gemini-haiku:
        - cerebras-haiku
        - groq-haiku
        - openrouter-haiku
    - cerebras-opus:
        - groq-opus
        - openrouter-opus
    - cerebras-sonnet:
        - groq-sonnet
        - openrouter-sonnet
    - cerebras-haiku:
        - groq-haiku
        - openrouter-haiku
    - groq-opus:
        - openrouter-opus
    - groq-sonnet:
        - openrouter-sonnet
    - groq-haiku:
        - openrouter-haiku
