---
services:
  litellm:
    container_name: litellm
    image: docker.litellm.ai/berriai/litellm:main-stable
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://github.com/dceoy/docker-claude-code}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-docker-claude-code}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-litellm}
      LITELLM_ANTHROPIC_DISABLE_NO_PROVIDER_ERROR: 'true'
      LITELLM_OPENROUTER_OPUS_MODEL: ${LITELLM_OPENROUTER_OPUS_MODEL:-openrouter/openrouter/openrouter/free}
      LITELLM_OPENROUTER_SONNET_MODEL: ${LITELLM_OPENROUTER_SONNET_MODEL:-openrouter/openrouter/openrouter/free}
      LITELLM_OPENROUTER_HAIKU_MODEL: ${LITELLM_OPENROUTER_HAIKU_MODEL:-openrouter/openrouter/openrouter/free}
      LITELLM_GEMINI_OPUS_MODEL: ${LITELLM_GEMINI_OPUS_MODEL:-gemini/gemini-3.1-pro-preview}
      LITELLM_GEMINI_SONNET_MODEL: ${LITELLM_GEMINI_SONNET_MODEL:-gemini/gemini-3-flash-preview}
      LITELLM_GEMINI_HAIKU_MODEL: ${LITELLM_GEMINI_HAIKU_MODEL:-gemini/gemini-2.5-flash-lite}
    command:
      - --config
      - /app/config.yml
      - --host
      - 0.0.0.0
      - --port
      - '4000'
    ports:
      - '4000:4000'
    volumes:
      - ./litellm.config.yml:/app/config.yml:ro
  claude-code:
    container_name: claude-code
    image: dceoy/claude-code:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: cli
      args:
        USER_NAME: claude
        USER_UID: '1001'
        USER_GID: '1001'
    depends_on:
      - litellm
    environment:
      ANTHROPIC_BASE_URL: http://litellm:4000
      ANTHROPIC_AUTH_TOKEN: ${LITELLM_API_KEY:-sk-litellm}
      ANTHROPIC_API_KEY: ''   # Important: Must be explicitly empty
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-gemini-opus}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-gemini-sonnet}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-gemini-haiku}
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace
      - claude-config:/home/claude/.claude
    working_dir: /workspace
    entrypoint:
      - claude
    command:
      - --dangerously-skip-permissions
volumes:
  claude-config:
